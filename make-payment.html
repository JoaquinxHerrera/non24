// --- Function to Handle Button Loading State ---
function toggleLoading(isLoading) {
    const checkoutButton = document.getElementById('stripe-checkout-button');
    if (checkoutButton) {
        if (isLoading) {
            checkoutButton.setAttribute('data-original-text', checkoutButton.textContent);
            checkoutButton.textContent = 'Loading Payment...';
            checkoutButton.disabled = true;
            checkoutButton.style.opacity = '0.5'; // Keeps existing opacity fade
            checkoutButton.style.cursor = 'wait';
            checkoutButton.style.color = '#FFFFFF'; // Explicitly set text color to white during loading
        } else {
            if (checkoutButton.hasAttribute('data-original-text')) {
                checkoutButton.textContent = checkoutButton.getAttribute('data-original-text');
                checkoutButton.removeAttribute('data-original-text');
            }
            checkoutButton.disabled = false;
            checkoutButton.style.opacity = '1';
            checkoutButton.style.cursor = 'pointer';
            checkoutButton.style.color = '#FFFFFF'; // Explicitly set text color to white after loading
        }
    }
}
// --- Generic Function for API Calls (adapted for this script) ---
async function callApi(endpoint, method = 'POST', body = null) {
    toggleLoading(true); // Activate loading state at the start of the API call
    try {
        const headers = {
            'Content-Type': 'application/json',
            'x-api-key': X_API_KEY,
            'x-provider-id': X_PROVIDER_ID
        };
        const config = { method: method, headers: headers };
        if (body) {
            config.body = JSON.stringify(body);
        }
        const response = await fetch(`${API_BASE_URL}${endpoint}`, config);
        const data = await response.json();
        if (!response.ok) {
            // Handle HTTP response errors (e.g., 400, 401, 500)
            throw new Error(data.message || `API call failed with status ${response.status}`);
        }
        return data;
    } catch (error) {
        // Show alert to the user in case of error
        alert(`Payment processing error: ${error.message || 'Something went wrong with the API call. Please try again.'}`);
        throw error; // Propagate the error to be caught by .catch()
    } finally {
        toggleLoading(false); // Deactivate loading state on completion (success or error)
    }
}
